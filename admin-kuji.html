<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 管理後台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page admin-page">
    <section class="hero-card compact-hero">
      <div class="hero-content">
        <p class="eyebrow">管理後台</p>
        <h1>會員點數與一番賞管理</h1>
        <p class="hero-text">搜尋會員、加點 / 扣點、建立草稿、上架活動與查看抽獎紀錄都在這裡。</p>
      </div>
      <div class="hero-actions" id="auth-section">
        <button class="btn btn-primary" id="login-btn" type="button">使用 LINE 登入</button>
        <a class="btn btn-secondary" href="./index.html">返回會員中心</a>
      </div>
    </section>

    <div class="message" id="message-box" style="display:none;"></div>

    <section class="card admin-topbar" id="member-section" style="display:none;">
      <div class="member-header compact-member-header">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <div class="member-role-badge vip">管理員</div>
        </div>
        <div class="member-actions"><button class="btn btn-secondary" id="logout-btn" type="button">登出</button></div>
      </div>
    </section>

    <div class="admin-layout" id="admin-layout" style="display:none;">
      <section class="card admin-sidebar-card">
        <div class="section-header"><h2>活動列表</h2><button class="btn btn-primary" id="new-campaign-btn" type="button">新增草稿</button></div>
        <button class="btn btn-secondary admin-sidebar-refresh" id="refresh-campaigns-btn" type="button">刷新</button>
        <div id="campaign-list" class="list-wrap"></div>
      </section>

      <section class="card admin-main-card">
        <div class="admin-card-header">
          <h2 id="editor-title">新增草稿</h2>
          <span class="status-pill" id="campaign-status-pill">draft</span>
        </div>
        <div class="form-grid two-col">
          <input type="text" id="campaign-id" class="input" placeholder="活動 ID（新增時留空）" readonly />
          <input type="text" id="campaign-title" class="input" placeholder="活動名稱" />
          <input type="number" id="points-per-draw" class="input" placeholder="單抽點數" min="1" step="1" />
          <input type="number" id="total-tickets" class="input" placeholder="總籤數" min="1" step="1" />
          <input type="number" id="max-draw-per-order" class="input" placeholder="單次最多抽數" min="1" step="1" />
          <input type="number" id="turn-hold-seconds" class="input" placeholder="保留秒數" min="1" step="1" />
          <input type="text" id="cover-image-url" class="input" placeholder="封面圖片 URL" />
          <input type="datetime-local" id="starts-at" class="input" />
          <input type="datetime-local" id="ends-at" class="input" />
        </div>
        <textarea id="campaign-description" class="input textarea" placeholder="活動說明"></textarea>

        <div class="admin-subcard">
          <div class="section-header"><h3>獎項設定</h3><button class="btn btn-secondary" id="add-prize-row-btn" type="button">新增獎項列</button></div>
          <div id="prize-rows" class="prize-rows"></div>
          <p class="nickname-tip" id="prize-summary">獎項總數 0，總籤數 0，兩者必須相等。</p>
        </div>

        <div class="admin-action-row wrap-row">
          <button class="btn btn-primary" id="save-campaign-btn" type="button">儲存草稿</button>
          <button class="btn btn-secondary" id="publish-campaign-btn" type="button">上架活動</button>
          <button class="btn btn-secondary" id="pause-campaign-btn" type="button">暫停</button>
          <button class="btn btn-secondary" id="resume-campaign-btn" type="button">恢復上架</button>
          <button class="btn btn-danger" id="end-campaign-btn" type="button">結束活動</button>
        </div>

        <div class="admin-subcard">
          <div class="section-header"><h3>抽獎紀錄</h3><button class="btn btn-secondary" id="refresh-orders-btn" type="button">刷新紀錄</button></div>
          <div id="order-list" class="list-wrap"></div>
        </div>
      </section>

      <section class="card admin-right-card">
        <div class="section-header"><h2>會員管理</h2></div>
        <div class="row">
          <input type="text" id="member-search-input" class="input" placeholder="輸入會員名稱或暱稱" />
          <button class="btn btn-secondary" id="member-search-btn" type="button">搜尋</button>
        </div>
        <div id="member-search-results" class="list-wrap"></div>

        <div class="admin-subcard">
          <h3>手動加點</h3>
          <div class="form-grid single-col">
            <input type="text" id="grant-member-id" class="input" placeholder="會員 ID" />
            <input type="number" id="grant-points" class="input" placeholder="加點點數" min="1" step="1" />
            <input type="text" id="grant-reason" class="input" placeholder="加點原因" maxlength="100" />
          </div>
          <button class="btn btn-primary" id="grant-points-btn" type="button">確認加點</button>
        </div>

        <div class="admin-subcard">
          <h3>手動扣點</h3>
          <div class="form-grid single-col">
            <input type="text" id="deduct-member-id" class="input" placeholder="會員 ID" />
            <input type="number" id="deduct-points" class="input" placeholder="扣點點數" min="1" step="1" />
            <input type="text" id="deduct-reason" class="input" placeholder="扣點原因" maxlength="100" />
          </div>
          <button class="btn btn-danger" id="deduct-points-btn" type="button">確認扣點</button>
        </div>
      </section>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./admin-kuji.js"></script>
</body>
</html>
