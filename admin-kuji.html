<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 一番賞管理後台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page admin-page">
    <section class="hero-card">
      <div>
        <p class="eyebrow">管理員後台</p>
        <h1>一番賞活動管理</h1>
        <p class="hero-text">建立草稿、設定獎項、上架活動、查看抽獎紀錄。</p>
      </div>
      <div class="header-actions">
        <button id="login-btn" class="btn btn-primary" type="button">使用 LINE 登入</button>
        <button id="logout-btn" class="btn btn-secondary" type="button" style="display:none;">登出</button>
        <a class="more-link" href="./index.html">← 回會員中心</a>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>
    <section id="member-section" class="card" style="display:none;">
      <div class="member-header compact">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=Admin" alt="頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <div class="member-role-badge">管理員</div>
        </div>
      </div>
    </section>

    <div class="two-pane admin-layout">
      <section class="card pane-list">
        <div class="section-header">
          <h2>活動列表</h2>
          <div class="header-actions">
            <button id="new-campaign-btn" class="btn btn-primary" type="button">新增草稿</button>
            <button id="refresh-list-btn" class="btn btn-secondary" type="button">刷新</button>
          </div>
        </div>
        <div id="campaign-list" class="list-wrap"></div>
      </section>

      <section class="card pane-detail">
        <div id="editor-empty" class="empty-state">請先選擇活動，或按「新增草稿」。</div>
        <div id="editor-wrap" style="display:none;">
          <div class="section-header">
            <h2 id="editor-title">活動編輯</h2>
            <span id="editor-status" class="status-chip idle">draft</span>
          </div>

          <div class="form-grid two-col">
            <input id="campaign-id" class="input" type="text" placeholder="活動 ID" disabled />
            <input id="campaign-title" class="input" type="text" placeholder="活動名稱" />
            <input id="campaign-points-per-draw" class="input" type="number" min="1" step="1" placeholder="每抽點數" />
            <input id="campaign-total-tickets" class="input" type="number" min="1" step="1" placeholder="總籤數" />
            <input id="campaign-max-draw" class="input" type="number" min="1" step="1" placeholder="單次最多抽幾張" />
            <input id="campaign-hold-seconds" class="input" type="number" min="10" step="1" placeholder="回合保留秒數" />
            <input id="campaign-cover-image" class="input" type="text" placeholder="封面圖片 URL" />
            <input id="campaign-starts-at" class="input" type="datetime-local" />
            <input id="campaign-ends-at" class="input" type="datetime-local" />
          </div>
          <textarea id="campaign-description" class="input textarea" placeholder="活動說明"></textarea>

          <section class="detail-block">
            <div class="section-header small">
              <h3>獎項設定</h3>
              <button id="add-prize-row-btn" class="btn btn-secondary" type="button">新增獎項列</button>
            </div>
            <div id="prize-rows" class="prize-row-list"></div>
            <p id="prize-total-tip" class="nickname-help">獎項總數必須等於總籤數。</p>
          </section>

          <div class="admin-action-bar">
            <button id="save-draft-btn" class="btn btn-primary" type="button">儲存草稿</button>
            <button id="publish-btn" class="btn btn-secondary" type="button">上架活動</button>
            <button id="pause-btn" class="btn btn-secondary" type="button">暫停</button>
            <button id="activate-btn" class="btn btn-secondary" type="button">恢復上架</button>
            <button id="end-btn" class="btn btn-danger" type="button">結束活動</button>
          </div>

          <section class="detail-block">
            <div class="section-header small">
              <h3>抽獎紀錄</h3>
              <button id="refresh-orders-btn" class="btn btn-secondary" type="button">刷新紀錄</button>
            </div>
            <div id="orders-list" class="list-wrap"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./admin-kuji.js"></script>
</body>
</html>
