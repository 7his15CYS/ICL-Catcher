<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 線上一番賞</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page kuji-page kuji-page-direct">
    <section class="hero-card">
      <div>
        <p class="eyebrow">線上一番賞</p>
        <h1>ICL 線上一番賞</h1>
        <p class="hero-text">進入活動後會直接看到整面籤紙。點任一張籤即可立即翻開結果，未中獎為黑底白字，中獎為金底黑字。</p>
      </div>
      <div class="header-actions">
        <button id="login-btn" class="btn btn-primary" type="button">使用 LINE 登入</button>
        <button id="logout-btn" class="btn btn-secondary" type="button" style="display:none;">登出</button>
        <a class="more-link" href="./index.html">← 回會員中心</a>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>

    <section id="member-section" class="card" style="display:none;">
      <div class="member-header compact">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
      </div>
    </section>

    <div class="two-pane two-pane-wide">
      <section class="card pane-list pane-list-compact">
        <div class="section-header">
          <h2>活動列表</h2>
          <button id="refresh-campaigns-btn" class="btn btn-secondary" type="button">重新整理</button>
        </div>
        <div id="campaign-list" class="list-wrap"></div>
      </section>

      <section class="card pane-detail pane-detail-focus">
        <div id="campaign-empty" class="empty-state">請先從左側選擇活動</div>
        <div id="campaign-detail" style="display:none;">
          <div class="section-header section-header-top">
            <div>
              <h2 id="campaign-title">-</h2>
              <p id="campaign-description" class="muted campaign-description"></p>
            </div>
            <span id="campaign-status-badge" class="status-chip idle">未開始</span>
          </div>

          <div class="kuji-banner-row">
            <img id="campaign-image" class="kuji-cover" src="https://placehold.co/800x420?text=KUJI" alt="活動封面" />
            <div class="kuji-side-panel">
              <div id="campaign-stats" class="stat-grid stat-grid-compact"></div>
              <div class="ticket-legend">
                <span class="legend-chip legend-closed">未翻開</span>
                <span class="legend-chip legend-lose">未中獎</span>
                <span class="legend-chip legend-win">中獎</span>
              </div>
              <div id="ticket-hint" class="ticket-hint">請先登入，登入後可直接點籤翻牌。</div>
              <div id="turn-status-inline" class="ticket-turn-status muted"></div>
            </div>
          </div>

          <section class="detail-block detail-block-emphasis">
            <div class="section-header">
              <h3>抽籤籤紙</h3>
              <div id="ticket-progress" class="ticket-progress">-</div>
            </div>
            <p class="ticket-wall-note">直接點任一張可抽的籤紙即可翻開。若目前有人正在操作，系統會依回合保護限制暫時鎖定。</p>
            <div id="ticket-wall" class="ticket-wall"></div>
          </section>

          <section class="detail-block">
            <h3>獎項剩餘</h3>
            <div id="prize-list" class="prize-grid"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./kuji.js"></script>
</body>
</html>
