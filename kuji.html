<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 線上一番賞</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page kuji-page">
    <section class="hero-card">
      <div>
        <p class="eyebrow">線上一番賞</p>
        <h1>ICL 線上一番賞</h1>
        <p class="hero-text">先取得本活動的抽籤回合，再決定要抽幾張。正式抽籤後會一次產生對應數量的籤紙，會員可逐張點開查看結果。</p>
      </div>
      <div class="header-actions">
        <button id="login-btn" class="btn btn-primary" type="button">使用 LINE 登入</button>
        <button id="logout-btn" class="btn btn-secondary" type="button" style="display:none;">登出</button>
        <a class="more-link" href="./index.html">← 回會員中心</a>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>

    <section id="member-section" class="card" style="display:none;">
      <div class="member-header compact">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
      </div>
    </section>

    <div class="two-pane">
      <section class="card pane-list">
        <div class="section-header">
          <h2>活動列表</h2>
          <button id="refresh-campaigns-btn" class="btn btn-secondary" type="button">重新整理</button>
        </div>
        <div id="campaign-list" class="list-wrap"></div>
      </section>

      <section class="card pane-detail">
        <div id="campaign-empty" class="empty-state">請先從左側選擇活動</div>
        <div id="campaign-detail" style="display:none;">
          <div class="section-header">
            <h2 id="campaign-title">-</h2>
            <span id="campaign-status-badge" class="status-chip idle">未開始</span>
          </div>
          <img id="campaign-image" class="hero-banner" src="https://placehold.co/1200x600?text=KUJI" alt="活動封面" />
          <p id="campaign-description" class="muted"></p>
          <div id="campaign-stats" class="stat-grid"></div>

          <div class="turn-box">
            <div>
              <h3>抽籤回合</h3>
              <p id="turn-status-text" class="muted">尚未取得回合</p>
            </div>
            <div class="turn-actions">
              <div id="turn-countdown" class="countdown">-</div>
              <button id="claim-turn-btn" class="btn btn-primary" type="button">開始抽籤</button>
              <button id="release-turn-btn" class="btn btn-secondary" type="button">放棄回合</button>
            </div>
          </div>

          <div class="draw-box">
            <div class="inline-form">
              <label for="draw-count-input">抽幾張</label>
              <input id="draw-count-input" class="input small" type="number" min="1" step="1" value="1" />
              <button id="draw-btn" class="btn btn-primary" type="button">正式抽籤</button>
              <button id="refresh-detail-btn" class="btn btn-secondary" type="button">刷新狀態</button>
            </div>
            <p class="nickname-help">正式抽籤後，系統會一次顯示本次抽出的所有籤紙。點擊籤紙即可翻開；未中獎會顯示黑底，有中獎會顯示金底與獎品內容。</p>
          </div>

          <section class="detail-block">
            <h3>獎項剩餘</h3>
            <div id="prize-list" class="prize-grid"></div>
          </section>

          <section class="detail-block">
            <div class="section-header section-header-tight">
              <h3>本次抽獎結果</h3>
              <button id="reveal-all-btn" class="btn btn-secondary" type="button" style="display:none;">全部翻開</button>
            </div>
            <div id="draw-result-summary" class="draw-result-summary"></div>
            <div id="draw-result-box" class="ticket-board"><div class="empty-state">尚未抽獎</div></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./kuji.js"></script>
</body>
</html>
