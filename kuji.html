<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 線上一番賞</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page kuji-page kuji-page-direct">
    <section class="hero-card compact-hero">
      <div>
        <p class="eyebrow">線上一番賞</p>
        <h1>ICL 線上一番賞</h1>
        <p class="hero-text">此頁面僅限 VIP 會員與管理員查看。</p>
      </div>
      <div class="header-actions">
        <button id="login-btn" class="btn btn-primary" type="button">使用 LINE 登入</button>
        <button id="logout-btn" class="btn btn-secondary" type="button" style="display:none;">登出</button>
        <a class="more-link" href="./index.html">← 回會員中心</a>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>

    <section id="member-section" class="card" style="display:none;">
      <div class="member-header compact">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
      </div>
    </section>


    <section id="access-denied-section" class="card" style="display:none;">
      <div class="section-header">
        <div>
          <h2>權限不足</h2>
          <p class="nickname-help" id="access-denied-text">此頁面僅限 VIP 會員與管理員查看。</p>
        </div>
      </div>
    </section>

    <div id="kuji-content" class="two-pane kuji-direct-layout" style="display:none;">
      <section class="card pane-list">
        <div class="section-header">
          <h2>活動列表</h2>
          <button id="refresh-campaigns-btn" class="btn btn-secondary" type="button">重新整理</button>
        </div>
        <div id="campaign-list" class="list-wrap"></div>
      </section>

      <section class="card pane-detail">
        <div id="campaign-empty" class="empty-state">請先從左側選擇活動</div>
        <div id="campaign-detail" style="display:none;">
          <div class="section-header">
            <h2 id="campaign-title">-</h2>
            <span id="campaign-status-badge" class="status-chip idle">未開始</span>
          </div>

          <div class="ichiban-hero">
            <img id="campaign-image" class="ichiban-cover" src="https://placehold.co/1200x600?text=KUJI" alt="活動封面" />
            <div>
              <p id="campaign-description" class="muted"></p>
              <div id="campaign-stats" class="ichiban-stats"></div>
            </div>
          </div>

          <section class="ticket-stage-wrap">
            <div class="ticket-stage-head">
              <div>
                <h3>抽獎籤紙</h3>
                <p id="ticket-wall-summary" class="muted">載入中...</p>
              </div>
              <div class="ticket-toolbar ticket-toolbar-right">
                <button id="refresh-wall-btn" class="btn btn-secondary" type="button">重新整理籤紙</button>
              </div>
            </div>

            <div id="turn-panel" class="turn-panel waiting">
              <div class="turn-panel-main">
                <div id="turn-status-title" class="turn-status-title">尚未鎖定回合</div>
                <div id="turn-status-text" class="turn-status-text">點任何一張籤紙後，系統才會開始為你保留回合。</div>
              </div>
              <div class="turn-panel-side">
                <div id="turn-countdown" class="turn-countdown">--</div>
                <button id="release-turn-btn" class="btn btn-danger" type="button" style="display:none;">退出並釋放回合</button>
              </div>
            </div>

            <div id="ticket-grid" class="ticket-grid direct-ticket-grid"></div>
          </section>

          <section class="detail-block">
            <h3>獎項剩餘</h3>
            <div id="prize-list" class="prize-grid"></div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./kuji.js"></script>
</body>
</html>
