<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 嚴選好物 - 點數兌換</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page" id="app-ready" style="display:block;">
    <section class="hero-card">
      <div class="hero-content">
        <p class="eyebrow">點數兌換</p>
        <h1>ICL 嚴選好物</h1>
        <p class="hero-text">依照分類瀏覽商品，找到你想兌換的獎品。</p>
      </div>

      <div class="hero-actions" id="auth-section">
        <button class="btn btn-primary" id="login-btn" type="button">使用 LINE 登入</button>
      </div>
    </section>

    <div class="message" id="message-box" style="display:none;"></div>

    <section class="card" id="member-section" style="display:none;">
      <div class="member-header">
        <img
          id="member-avatar"
          class="member-avatar"
          src="https://placehold.co/96x96?text=User"
          alt="會員頭像"
        />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
        <div class="member-actions">
          <button class="btn btn-secondary" id="logout-btn" type="button" style="display:none;">登出</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>獎品分類</h2>
        <a class="more-link" href="./index.html">← 回會員中心</a>
      </div>

      <div class="category-tabs" id="category-tabs"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2 id="shop-section-title">全部獎品</h2>
      </div>
      <div id="shop-rewards-list" class="reward-grid"></div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./shop.js"></script>
</body>
</html>
