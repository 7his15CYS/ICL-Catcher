<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL嚴選好物</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page" id="app-ready" style="display:block;">
    <section class="hero-card">
      <div class="hero-content">
        <p class="eyebrow">會員中心</p>
        <h1>ICL嚴選好物</h1>
        <p class="hero-text">夾娃娃累積點數、查詢排行榜與兌換獎品都在這裡完成唷</p>
      </div>

      <div class="hero-actions" id="auth-section">
        <button class="btn btn-primary" id="login-btn" type="button">使用 LINE 登入</button>
      </div>
    </section>

    <div class="message" id="message-box" style="display:none;"></div>

    <section class="card" id="member-section" style="display:none;">
      <div class="member-header">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <div id="member-role-badge" class="member-role-badge" style="display:none;"></div>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
        <div class="member-actions">
          <button class="btn btn-secondary" id="logout-btn" type="button" style="display:none;">登出</button>
        </div>
      </div>

      <div class="nickname-card">
        <div class="nickname-title-row">
          <h3>排行榜顯示名稱</h3>
          <p class="nickname-help">您可以自行設定暱稱。排行榜只顯示暱稱，不顯示 LINE 真名。</p>
        </div>

        <div class="nickname-form">
          <input type="text" id="nickname-input" class="input" maxlength="20" placeholder="請輸入你的暱稱" autocomplete="off" />
          <button class="btn btn-primary" id="nickname-save-btn" type="button">更新暱稱</button>
        </div>

        <p class="nickname-tip">限制：2~20 字，不能和別人重複，可用中文、英文、數字、空格、底線、連字號。</p>
      </div>
    </section>

    <section class="card" id="ichiban-section" style="display:none;">
      <div class="section-header">
        <h2>線上一番賞</h2>
        <a class="more-link" id="ichiban-entry-link" href="./kuji.html" target="_blank" rel="noopener noreferrer">進入一番賞頁面 →</a>
      </div>
      <div id="ichiban-summary" class="list-wrap"></div>
    </section>

    <section class="card" id="admin-section" style="display:none;">
      <div class="section-header">
        <div>
          <h2>管理員後台</h2>
          <p class="nickname-help">會員搜尋、手動加點 / 扣點、一番賞活動管理。</p>
        </div>
        <a class="btn btn-primary" href="./admin-kuji.html" target="_blank" rel="noopener noreferrer">前往管理後台</a>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>精選獎品</h2>
        <a class="more-link" href="./shop.html">更多獎品 →</a>
      </div>
      <div id="rewards-list" class="reward-grid"></div>
    </section>

    <section class="card">
      <h2>兌換紀錄</h2>
      <div id="redemption-list" class="list-wrap"></div>
    </section>

    <section class="card">
      <h2>排行榜</h2>
      <div id="leaderboard-list" class="list-wrap"></div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
