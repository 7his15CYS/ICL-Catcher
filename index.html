<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 會員點數中心</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div>
        <p class="eyebrow">會員中心</p>
        <h1>ICL 會員點數中心</h1>
        <p class="hero-text">查詢點數、兌換商品、進入線上一番賞，都從這裡開始。</p>
      </div>
      <div id="auth-section">
        <button class="btn btn-primary" id="login-btn" type="button">使用 LINE 登入</button>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>

    <section class="card" id="member-section" style="display:none;">
      <div class="member-header">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
        <div class="member-actions">
          <button class="btn btn-secondary" id="logout-btn" type="button" style="display:none;">登出</button>
        </div>
      </div>

      <div class="nickname-card">
        <div class="section-header compact">
          <h3>排行榜顯示名稱</h3>
        </div>
        <div class="row">
          <input id="nickname-input" class="input" type="text" maxlength="20" placeholder="請輸入你的暱稱" autocomplete="off" />
          <button class="btn btn-primary" id="nickname-save-btn" type="button">更新暱稱</button>
        </div>
        <p class="muted">限制：2~20 字，可用中文、英文、數字、空格、底線、連字號。</p>
      </div>
    </section>

    <section class="card" id="kuji-section">
      <div class="section-header">
        <h2>線上一番賞</h2>
        <a class="more-link" href="./kuji.html">進入一番賞頁面 →</a>
      </div>
      <div id="kuji-summary" class="reward-grid"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>可兌換獎品</h2>
        <a class="more-link" href="./shop.html">更多獎品 →</a>
      </div>
      <div id="rewards-list" class="reward-grid"></div>
    </section>

    <section class="card">
      <h2>兌換紀錄</h2>
      <div id="redemption-list" class="list-wrap"></div>
    </section>

    <section class="card">
      <h2>排行榜</h2>
      <div id="leaderboard-list" class="list-wrap"></div>
    </section>

    <section class="card" id="admin-entry-section" style="display:none;">
      <div class="section-header">
        <h2>管理員功能</h2>
      </div>
      <div class="admin-entry-box">
        <p>管理一番賞活動、上架草稿、查看抽獎紀錄。</p>
        <a class="btn btn-primary" href="./admin-kuji.html">前往一番賞後台</a>
      </div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
