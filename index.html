<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 嚴選好物</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
</head>
<body>
  <main class="page" id="app-ready" style="display:block;">
    <section class="hero-card">
      <div class="hero-content">
        <p class="eyebrow">會員中心</p>
        <h1>ICL 嚴選好物</h1>
        <p class="hero-text">好好玩~好開心~還可以累積點數換獎品喔！</p>
      </div>

      <div class="hero-actions" id="auth-section">
        <button class="btn btn-primary" id="login-btn">使用 LINE 登入</button>
      </div>
    </section>

    <div class="message" id="message-box" style="display:none;"></div>

    <section class="card" id="member-section" style="display:none;">
      <div class="member-header">
        <img
          id="member-avatar"
          class="member-avatar"
          src="https://placehold.co/96x96?text=User"
          alt="會員頭像"
        />

        <div class="member-info">
          <h2 id="member-name">-</h2>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>

        <div class="member-actions">
          <button class="btn btn-secondary" id="logout-btn" style="display:none;">登出</button>
        </div>
      </div>

      <div class="nickname-card">
        <div class="nickname-title-row">
          <h3>排行榜顯示名稱</h3>
          <p class="nickname-help">你可以自行設定暱稱。排行榜只顯示暱稱，不顯示 LINE 真名。</p>
        </div>

        <div class="nickname-form">
          <input
            type="text"
            id="nickname-input"
            class="input"
            maxlength="20"
            placeholder="請輸入你的暱稱"
          />
          <button class="btn btn-primary" id="nickname-save-btn">更新暱稱</button>
        </div>

        <p class="nickname-tip">限制：2~20 字，不能和別人重複，可用中文、英文、數字、空格、底線、連字號。</p>
      </div>
    </section>

    <section class="card">
      <h2>可兌換商品</h2>
      <div id="rewards-list" class="reward-grid"></div>
    </section>

    <section class="card">
      <h2>兌換紀錄</h2>
      <div id="redemption-list" class="list-wrap"></div>
    </section>

    <section class="card">
      <h2>排行榜</h2>
      <div id="leaderboard-list" class="list-wrap"></div>
    </section>

    <section class="card" id="admin-section" style="display:none;">
      <h2>管理員功能</h2>

      <div class="admin-block">
        <h3>搜尋會員</h3>
        <div class="row">
          <input
            type="text"
            id="admin-search-input"
            class="input"
            placeholder="輸入會員名稱或暱稱"
          />
          <button class="btn btn-secondary" id="admin-search-btn">搜尋</button>
        </div>
        <div id="admin-search-results" class="list-wrap"></div>
      </div>

      <div class="admin-block">
        <h3>手動加點</h3>
        <div class="form-grid">
          <input
            type="text"
            id="grant-points-member-id"
            class="input"
            placeholder="會員 ID"
          />
          <input
            type="number"
            id="grant-points-value"
            class="input"
            placeholder="點數"
          />
          <input
            type="text"
            id="grant-points-reason"
            class="input"
            placeholder="原因"
          />
        </div>
        <button class="btn btn-primary" id="grant-points-btn">確認加點</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
