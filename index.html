<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICL 會員點數中心</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div>
        <p class="eyebrow">會員中心</p>
        <h1>ICL 會員點數中心</h1>
        <p class="hero-text">查點數、改暱稱、兌換商品、進入線上一番賞，都在這裡完成。</p>
      </div>
      <div id="auth-section">
        <button id="login-btn" class="btn btn-primary" type="button">使用 LINE 登入</button>
        <button id="logout-btn" class="btn btn-secondary" type="button" style="display:none;">登出</button>
      </div>
    </section>

    <div id="message-box" class="message" style="display:none;"></div>

    <section id="member-section" class="card" style="display:none;">
      <div class="member-header">
        <img id="member-avatar" class="member-avatar" src="https://placehold.co/96x96?text=User" alt="會員頭像" />
        <div class="member-info">
          <h2 id="member-name">-</h2>
          <div id="member-role-badge" class="member-role-badge">一般會員</div>
          <p class="points-label">目前點數</p>
          <div class="points-value"><span id="member-points">0</span> 點</div>
        </div>
      </div>

      <div class="nickname-card">
        <div class="nickname-title-row">
          <h3>排行榜顯示名稱</h3>
          <p class="nickname-help">排行榜只顯示暱稱，不顯示 LINE 真名。</p>
        </div>
        <div class="nickname-form">
          <input id="nickname-input" class="input" type="text" maxlength="20" placeholder="請輸入你的暱稱" />
          <button id="nickname-save-btn" class="btn btn-primary" type="button">更新暱稱</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>線上一番賞</h2>
        <div class="header-actions">
          <a class="more-link" href="./kuji.html">進入抽獎頁 →</a>
          <a id="admin-kuji-link" class="more-link" href="./admin-kuji.html" style="display:none;">管理後台 →</a>
        </div>
      </div>
      <div id="kuji-summary" class="reward-grid"></div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>可兌換獎品</h2>
        <a class="more-link" href="./shop.html">更多獎品 →</a>
      </div>
      <div id="rewards-list" class="reward-grid"></div>
    </section>

    <section class="card">
      <h2>兌換紀錄</h2>
      <div id="redemption-list" class="list-wrap"></div>
    </section>

    <section class="card">
      <h2>排行榜</h2>
      <div id="leaderboard-list" class="list-wrap"></div>
    </section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
